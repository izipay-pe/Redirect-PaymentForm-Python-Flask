{% extends 'base.html' %}
{% block extrahead %}

{% endblock %}
{% block extrastyles %}
{% endblock %}

{% block body %}
    <section class="container" >
        <div class="row">
            <div class="col mx-auto">
                <h2 style="color: white">Confirmar compra</h2>
                <div class='checkout'>
                    <form action="{{data.url_izipay}}" method="post">
                        <input type="hidden" name="vads_action_mode" value="{{data.redirect.vads_action_mode}}"/>
                        <input type="hidden" name="vads_amount" value="{{data.redirect.vads_amount}}" />
                        <input type="hidden" name="vads_ctx_mode" value="{{data.redirect.vads_ctx_mode}}" />
                        <input type="hidden" name="vads_currency" value="{{data.redirect.vads_currency}}" />
                        <input type="hidden" name="vads_cust_email" value="{{data.redirect.vads_cust_email}}" />
                        <input type="hidden" name="vads_page_action" value="{{data.redirect.vads_page_action}}" />
                        <input type="hidden" name="vads_payment_config" value="{{data.redirect.vads_payment_config}}" />
                        <input type="hidden" name="vads_site_id" value="{{data.redirect.vads_site_id}}" />
                        <input type="hidden" name="vads_trans_date" value="{{data.redirect.vads_trans_date}}" />
                        <input type="hidden" name="vads_trans_id" value="{{data.redirect.vads_trans_id}}" />
                        <input type="hidden" name="vads_version" value="{{data.redirect.vads_version}}" />
                        <input type="hidden" name="vads_order_id" value="{{data.redirect.vads_order_id}}" />
                        <input type="hidden" name="vads_url_success" value="{{data.redirect.vads_url_success}}" />
                        <input type="hidden" name="vads_return_mode" value="{{data.redirect.vads_return_mode}}" />
                        <input type="hidden" name="vads_redirect_success_timeout" value="{{data.redirect.vads_redirect_success_timeout}}" />
                        <input type="hidden" name="signature" value="{{data.signature}}" />
                        <input  class="btn btn-izi w-50 mx-auto text-white mt-2" type="submit" value="Pagar" />
                    </form>
                </div>
            </div>
        </div>
  </section>
{% endblock %}

    <script>
    </script>
{% endblock %}
